<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111318; font-family: 'Inter', sans-serif; padding: 56px; display: flex; flex-direction: column; gap: 48px; }
  .section-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 12px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .cell { padding: 44px 52px; display: flex; align-items: center; justify-content: center; }
  .w { background: #ffffff; }
  .n { background: #002868; }
  .b { background: #0A0A0A; }
  .r { background: #D90012; }
  .g { background: #F4F5F9; }
</style>
</head>
<body>

<!-- ════════════════════
  D — Circle Monogram
  RR enclosed in a ring,
  classic + modern premium feel
════════════════════ -->
<div>
  <div class="section-label">D — Circle Monogram</div>
  <div class="row">

    <div class="cell g" style="flex:2;">
      <svg width="380" height="80" viewBox="0 0 420 80">
        <!-- Circle mark -->
        <circle cx="40" cy="40" r="36" stroke="#002868" stroke-width="3" fill="none"/>
        <text x="40" y="52" font-family="Montserrat" font-size="28" font-weight="900" fill="#002868" text-anchor="middle" letter-spacing="-1">RR</text>
        <!-- wordmark -->
        <line x1="92" y1="10" x2="92" y2="70" stroke="#E0E2EA" stroke-width="1.5"/>
        <text x="108" y="36" font-family="Montserrat" font-size="15" font-weight="700" fill="#002868" letter-spacing="0.5">REV &amp; RACHEL</text>
        <text x="108" y="57" font-family="Inter" font-size="9" font-weight="500" fill="#9CA3AF" letter-spacing="5">FOUNDATION</text>
      </svg>
    </div>

    <div class="cell n" style="flex:2;">
      <svg width="380" height="80" viewBox="0 0 420 80">
        <circle cx="40" cy="40" r="36" stroke="#F2A800" stroke-width="3" fill="none"/>
        <text x="40" y="52" font-family="Montserrat" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">RR</text>
        <line x1="92" y1="10" x2="92" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <text x="108" y="36" font-family="Montserrat" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="0.5">REV &amp; RACHEL</text>
        <text x="108" y="57" font-family="Inter" font-size="9" font-weight="500" fill="rgba(255,255,255,0.38)" letter-spacing="5">FOUNDATION</text>
      </svg>
    </div>

    <div class="cell b" style="padding:22px;">
      <svg width="76" height="76" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="36" stroke="#D90012" stroke-width="3.5" fill="none"/>
        <text x="40" y="51" font-family="Montserrat" font-size="26" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">RR</text>
      </svg>
    </div>
    <div class="cell w" style="padding:22px;">
      <svg width="76" height="76" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="36" stroke="#002868" stroke-width="3.5" fill="none"/>

    </div>
    <div class="cell r" style="padding:22px;">

      </svg>
    </div>
    <div class="cell n" style="padding:22px;">
      <svg width="76" height="76" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="36" stroke="#F2A800" stroke-width="3.5" fill="none"/>
        <text x="40" y="51" font-family="Montserrat" font-size="26" font-weight="900" fill="#F2A800" text-anchor="middle" letter-spacing="-1">RR</text>
      </svg>
    </div>
  </div>
</div>
