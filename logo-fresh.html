<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0F1F5; font-family: 'Inter', sans-serif; padding: 0; }
  .section { padding: 48px 56px; border-bottom: 1px solid #DDE0EA; }
  .section-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 28px; }
  .swatches { display: flex; gap: 0; }
  .sw { padding: 44px 52px; display: flex; align-items: center; justify-content: center; flex: 1; }
  .sw-w { background: #ffffff; }
  .sw-n { background: #002868; }
  .sw-b { background: #080C18; }
  .sw-r { background: #D90012; }
  .sw-g { background: #F5F6FA; }
</style>
</head>
<body>

<!-- ══════════════════════════════════
  1 — ELEGANT WORDMARK
  No gimmicks. Just perfect typography.
  "Rev & Rachel" in refined caps
══════════════════════════════════ -->
<div class="section">
  <div class="section-label">1 — Refined Wordmark</div>
  <div class="swatches">

    <div class="sw sw-w" style="flex:3;">
      <svg width="460" height="72" viewBox="0 0 500 72">
        <text x="0" y="44" font-family="EB Garamond" font-size="42" font-weight="600" fill="#002868" letter-spacing="3">REV &amp; RACHEL</text>
        <rect x="0" y="52" width="500" height="2" fill="#D90012"/>
        <text x="0" y="68" font-family="Montserrat" font-size="9" font-weight="300" fill="#9CA3AF" letter-spacing="8">FOUNDATION</text>
      </svg>
    </div>

    <div class="sw sw-n" style="flex:2;">
      <svg width="340" height="72" viewBox="0 0 380 72">
        <text x="0" y="44" font-family="EB Garamond" font-size="42" font-weight="600" fill="#ffffff" letter-spacing="3">REV &amp; RACHEL</text>
        <rect x="0" y="52" width="380" height="2" fill="#F2A800"/>
        <text x="0" y="68" font-family="Montserrat" font-size="9" font-weight="300" fill="rgba(255,255,255,0.4)" letter-spacing="8">FOUNDATION</text>
      </svg>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════
  2 — SPLIT INITIAL + WORDMARK
  Large "R" as anchor, small wordmark
  Asymmetric, editorial, modern
══════════════════════════════════ -->
<div class="section">
  <div class="section-label">2 — Editorial Initial</div>
  <div class="swatches">

    <div class="sw sw-w" style="flex:2;">
      <svg width="360" height="80" viewBox="0 0 400 80">
        <!-- Big R anchor -->
        <text x="0" y="72" font-family="EB Garamond" font-size="80" font-weight="600" fill="#002868">R</text>
        <!-- Red accent line -->
        <rect x="58" y="12" width="3" height="56" fill="#D90012"/>
        <!-- stacked wordmark right of line -->
        <text x="74" y="36" font-family="Montserrat" font-size="13" font-weight="700" fill="#002868" letter-spacing="2">REV &amp; RACHEL</text>
        <text x="74" y="56" font-family="Montserrat" font-size="8.5" font-weight="300" fill="#9CA3AF" letter-spacing="6">FOUNDATION</text>
      </svg>
    </div>

    <div class="sw sw-b" style="flex:2;">
      <svg width="360" height="80" viewBox="0 0 400 80">
        <text x="0" y="72" font-family="EB Garamond" font-size="80" font-weight="600" fill="#F2A800">R</text>
        <rect x="58" y="12" width="3" height="56" fill="#D90012"/>
        <text x="74" y="36" font-family="Montserrat" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="2">REV &amp; RACHEL</text>
        <text x="74" y="56" font-family="Montserrat" font-size="8.5" font-weight="300" fill="rgba(255,255,255,0.38)" letter-spacing="6">FOUNDATION</text>
      </svg>
    </div>

    <div class="sw sw-r" style="flex:1.2;">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <text x="0" y="72" font-family="EB Garamond" font-size="80" font-weight="600" fill="#ffffff">R</text>
      </svg>
    </div>
    <div class="sw sw-n" style="flex:1.2;">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <text x="0" y="72" font-family="EB Garamond" font-size="80" font-weight="600" fill="#F2A800">R</text>
      </svg>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════
  3 — CREST / EMBLEM
  Flag-stripe above the name
  Institutional, like a real foundation
══════════════════════════════════ -->
<div class="section">
  <div class="section-label">3 — Foundation Crest</div>
  <div class="swatches">

    <div class="sw sw-w" style="flex:2; padding: 36px 48px;">
      <svg width="260" height="100" viewBox="0 0 260 100">
        <!-- tricolor top bar -->
        <rect x="0" y="0" width="260" height="5" fill="#D90012"/>
        <rect x="0" y="5" width="260" height="4" fill="#002868"/>
        <rect x="0" y="9" width="260" height="4" fill="#F2A800"/>
        <!-- main text -->
        <text x="130" y="52" font-family="EB Garamond" font-size="28" font-weight="600" fill="#002868" text-anchor="middle" letter-spacing="4">REV &amp; RACHEL</text>
        <!-- thin rule -->
        <line x1="20" y1="60" x2="240" y2="60" stroke="#D90012" stroke-width="1"/>
        <!-- sub text -->
        <text x="130" y="78" font-family="Montserrat" font-size="8.5" font-weight="400" fill="#9CA3AF" text-anchor="middle" letter-spacing="7">FOUNDATION</text>
        <!-- bottom flag bar -->
        <rect x="0" y="91" width="260" height="4" fill="#F2A800"/>
        <rect x="0" y="95" width="260" height="3" fill="#002868"/>
        <rect x="0" y="98" width="260" height="3" fill="#D90012"/>
      </svg>
    </div>

    <div class="sw sw-b" style="flex:2; padding: 36px 48px;">
      <svg width="260" height="100" viewBox="0 0 260 100">
        <rect x="0" y="0" width="260" height="5" fill="#D90012"/>
        <rect x="0" y="5" width="260" height="4" fill="#002868"/>
        <rect x="0" y="9" width="260" height="4" fill="#F2A800"/>
        <text x="130" y="52" font-family="EB Garamond" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="4">REV &amp; RACHEL</text>
        <line x1="20" y1="60" x2="240" y2="60" stroke="#F2A800" stroke-width="1"/>
        <text x="130" y="78" font-family="Montserrat" font-size="8.5" font-weight="400" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="7">FOUNDATION</text>
        <rect x="0" y="91" width="260" height="4" fill="#F2A800"/>
        <rect x="0" y="95" width="260" height="3" fill="rgba(255,255,255,0.2)"/>
        <rect x="0" y="98" width="260" height="3" fill="#D90012"/>
      </svg>
    </div>

    <div class="sw sw-n" style="flex:2; padding: 36px 48px;">
      <svg width="260" height="100" viewBox="0 0 260 100">
        <rect x="0" y="0" width="260" height="5" fill="#D90012"/>
        <rect x="0" y="5" width="260" height="4" fill="rgba(255,255,255,0.3)"/>
        <rect x="0" y="9" width="260" height="4" fill="#F2A800"/>
        <text x="130" y="52" font-family="EB Garamond" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="4">REV &amp; RACHEL</text>
        <line x1="20" y1="60" x2="240" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <text x="130" y="78" font-family="Montserrat" font-size="8.5" font-weight="400" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="7">FOUNDATION</text>
        <rect x="0" y="91" width="260" height="4" fill="#F2A800"/>
        <rect x="0" y="95" width="260" height="3" fill="rgba(255,255,255,0.2)"/>
        <rect x="0" y="98" width="260" height="3" fill="#D90012"/>
      </svg>
    </div>

  </div>
</div>

</body>
</html>
