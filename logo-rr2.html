<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ᴚR Monogram — B-4 Style</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@700&family=Manrope:wght@800&family=Syne:wght@800&family=Plus+Jakarta+Sans:wght@800&family=Urbanist:wght@800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0A1520; font-family:'Outfit',sans-serif; padding:48px 32px; }
h1 { color:rgba(255,255,255,0.18); font-size:0.68rem; letter-spacing:0.3em; text-transform:uppercase; text-align:center; margin-bottom:40px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:960px; margin:0 auto; }
.card { background:#0D1B2A; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,0.06); }
.card-header { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.06); font-size:0.7rem; color:rgba(255,255,255,0.38); letter-spacing:0.1em; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.badge { background:rgba(217,0,18,0.2); color:#f87171; font-size:0.6rem; padding:2px 7px; border-radius:20px; letter-spacing:0.08em; }
.dk { background:#0A1520; padding:40px 24px; display:flex; align-items:center; justify-content:center; }
.lt { background:#F4F1EC; padding:40px 24px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<h1>ᴚR Monogram · Modern Clean Fonts</h1>
<div class="grid">

  <div class="card">
    <div class="card-header">Outfit 800 <span class="badge">B-4 PICK</span></div>
    <div class="dk"><svg id="o_dk" width="260" height="130" viewBox="0 0 260 130"></svg></div>
    <div class="lt"><svg id="o_lt" width="260" height="130" viewBox="0 0 260 130"></svg></div>
  </div>

  <div class="card">
    <div class="card-header">Space Grotesk 700</div>
    <div class="dk"><svg id="sg_dk" width="260" height="130" viewBox="0 0 260 130"></svg></div>
    <div class="lt"><svg id="sg_lt" width="260" height="130" viewBox="0 0 260 130"></svg></div>
  </div>

  <div class="card">
    <div class="card-header">Manrope 800</div>
    <div class="dk"><svg id="mr_dk" width="260" height="130" viewBox="0 0 260 130"></svg></div>
    <div class="lt"><svg id="mr_lt" width="260" height="130" viewBox="0 0 260 130"></svg></div>
  </div>

  <div class="card">
    <div class="card-header">Syne 800</div>
    <div class="dk"><svg id="sy_dk" width="260" height="130" viewBox="0 0 260 130"></svg></div>
    <div class="lt"><svg id="sy_lt" width="260" height="130" viewBox="0 0 260 130"></svg></div>
  </div>

  <div class="card">
    <div class="card-header">Plus Jakarta Sans 800</div>
    <div class="dk"><svg id="pj_dk" width="260" height="130" viewBox="0 0 260 130"></svg></div>
    <div class="lt"><svg id="pj_lt" width="260" height="130" viewBox="0 0 260 130"></svg></div>
  </div>

  <div class="card">
    <div class="card-header">Urbanist 800</div>
    <div class="dk"><svg id="ur_dk" width="260" height="130" viewBox="0 0 260 130"></svg></div>
    <div class="lt"><svg id="ur_lt" width="260" height="130" viewBox="0 0 260 130"></svg></div>
  </div>

</div>
<script>
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs, parent, inner) {
  const e = document.createElementNS(ns, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if (inner !== undefined) e.innerHTML = inner;
  if (parent) parent.appendChild(e);
  return e;
}

function buildRR(id, bg, fg, fontFamily, fontSize, fontWeight) {
  const s = document.getElementById(id);
  if (!s) return;
  const cx = 130, baseline = 58;
  const gap = 1;

  // ── ᴚ (mirrored R) — stem toward center, bowl faces left ─────────
  const gL = el('g', {transform:`translate(${cx - gap},0) scale(-1,1)`}, s);
  el('text', {
    x: 0, y: baseline,
    'text-anchor': 'start',
    'font-family': fontFamily,
    'font-size': fontSize,
    'font-weight': fontWeight,
    fill: fg
  }, gL, 'R');

  // ── R — stem toward center, bowl faces right ──────────────────────
  el('text', {
    x: cx + gap, y: baseline,
    'text-anchor': 'start',
    'font-family': fontFamily,
    'font-size': fontSize,
    'font-weight': fontWeight,
    fill: fg
  }, s, 'R');

  // ── Reflection ────────────────────────────────────────────────────
  const reflGap = 6;
  const reflBaseline = baseline + reflGap;

  // ᴚ reflection: flip both X and Y, position so it appears below
  const gLR = el('g', {
    transform: `translate(${cx - gap}, ${2 * reflBaseline}) scale(-1,-1)`,
    opacity: '0.12'
  }, s);
  el('text', {
    x: 0, y: baseline,
    'text-anchor': 'start',
    'font-family': fontFamily,
    'font-size': fontSize,
    'font-weight': fontWeight,
    fill: fg
  }, gLR, 'R');

  // R reflection
  const gRR = el('g', {
    transform: `translate(${2*(cx + gap)}, ${2 * reflBaseline}) scale(-1,-1)`,
    opacity: '0.12'
  }, s);
  el('text', {
    x: cx + gap, y: baseline,
    'text-anchor': 'start',
    'font-family': fontFamily,
    'font-size': fontSize,
    'font-weight': fontWeight,
    fill: fg
  }, gRR, 'R');

  // ── FOUNDATION ────────────────────────────────────────────────────
  el('text', {
    x: cx, y: 122,
    'text-anchor': 'middle',
    'font-family': 'Outfit,sans-serif',
    'font-size': 7,
    'font-weight': 300,
    'letter-spacing': 5,
    fill: fg,
    opacity: '0.3'
  }, s, 'FOUNDATION');
}

buildRR('o_dk',  '#0A1520', '#ffffff', "'Outfit',sans-serif",            76, 800);
buildRR('o_lt',  '#F4F1EC', '#0D1B2A', "'Outfit',sans-serif",            76, 800);

buildRR('sg_dk', '#0A1520', '#ffffff', "'Space Grotesk',sans-serif",     72, 700);
buildRR('sg_lt', '#F4F1EC', '#0D1B2A', "'Space Grotesk',sans-serif",     72, 700);

buildRR('mr_dk', '#0A1520', '#ffffff', "'Manrope',sans-serif",           74, 800);
buildRR('mr_lt', '#F4F1EC', '#0D1B2A', "'Manrope',sans-serif",           74, 800);

buildRR('sy_dk', '#0A1520', '#ffffff', "'Syne',sans-serif",              70, 800);
buildRR('sy_lt', '#F4F1EC', '#0D1B2A', "'Syne',sans-serif",              70, 800);

buildRR('pj_dk', '#0A1520', '#ffffff', "'Plus Jakarta Sans',sans-serif", 72, 800);
buildRR('pj_lt', '#F4F1EC', '#0D1B2A', "'Plus Jakarta Sans',sans-serif", 72, 800);

buildRR('ur_dk', '#0A1520', '#ffffff', "'Urbanist',sans-serif",          76, 800);
buildRR('ur_lt', '#F4F1EC', '#0D1B2A', "'Urbanist',sans-serif",          76, 800);
</script>
</body>
</html>
